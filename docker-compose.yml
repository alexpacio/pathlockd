# Single-instance stack: pathlockd with embedded RocksDB storage.
# Everything lives in one container; only the gRPC port is published.
# Use this to run the daemon locally:
#
#   docker compose up --build
#
# pathlockd is then reachable at localhost:50051.

services:
  pathlockd:
    build: .
    restart: unless-stopped
    environment:
      PATHLOCKD_LISTEN: "0.0.0.0:50051"
      PATHLOCKD_DATA_DIR: "/data/pathlockd"
      PATHLOCKD_BOOTSTRAP: "true"
      PATHLOCKD_LOG_LEVEL: "info"
      # This compose file runs a SINGLE pathlockd instance — currently the
      # only safe deployment shape. Lock state is per-node and NOT yet
      # Raft-replicated: running multiple replicas against the same clients
      # breaks mutual exclusion. Cross-instance event fan-out
      # (PATHLOCKD_PEERS / PATHLOCKD_PEER_DISCOVERY_DNS) forwards Subscribe
      # events between instances but does not replicate lock state.
    ports:
      - "50051:50051"
    volumes:
      - pathlockd-data:/data/pathlockd

volumes:
  pathlockd-data:
