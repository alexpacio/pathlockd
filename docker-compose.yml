# Single-instance stack: pathlockd with embedded RocksDB storage.
# Everything lives in one container; only the gRPC port is published.
# Use this to run the daemon locally:
#
#   docker compose up --build
#
# pathlockd is then reachable at localhost:50051.

services:
  pathlockd:
    build: .
    restart: unless-stopped
    environment:
      PATHLOCKD_LISTEN: "0.0.0.0:50051"
      PATHLOCKD_DATA_DIR: "/data/pathlockd"
      PATHLOCKD_BOOTSTRAP: "true"
      PATHLOCKD_LOG_LEVEL: "info"
      # This compose file runs a SINGLE pathlockd instance for local use.
      # Replicated/HA deployment with cluster gossip and cross-instance event
      # fan-out is supported on Kubernetes (StatefulSet + headless Service) —
      # see deploy/kubernetes/. Env vars for multi-node: PATHLOCKD_SEED_NODES
      # for gossip bootstrap, PATHLOCKD_JOIN to join an existing cluster.
    ports:
      - "50051:50051"
    volumes:
      - pathlockd-data:/data/pathlockd

volumes:
  pathlockd-data:
