# Example pathlockd configuration. Pass with `--config pathlockd.toml` or
# `PATHLOCKD_CONFIG=pathlockd.toml`. Every value can be overridden by the
# corresponding PATHLOCKD_* environment variable (env wins over the file).

# gRPC listen address.
listen = "0.0.0.0:50051"

# Stable node identifier (required).
node_id = "pathlockd-0"

# RocksDB data directory.
data_dir = "/var/lib/pathlockd"

# Internal addresses (used for cluster communication).
public_addr = "http://localhost:50051"
raft_addr = "http://localhost:50052"
gossip_addr = "0.0.0.0:7946"

# Bootstrap a new cluster (single node or first node).
bootstrap = true

# Join an existing cluster (mutually exclusive with bootstrap).
# join = true
# seed_nodes = ["node1:7946", "node2:7946"]

# Number of Raft groups (deterministic sharding via HRW hashing).
group_count = 256

# Raft replication factor (must be odd).
replication_factor = 3

# Raft tuning.
raft_snapshot_interval_entries = 10000
raft_snapshot_min_log_entries = 5000
raft_max_inflight = 256

# RocksDB tuning.
rocksdb_wal_sync = true
rocksdb_max_open_files = 4096

# GC sweep of expired records (0 disables).
group_gc_interval_secs = 1
group_gc_batch = 1024

# Cross-instance event fan-out. Leave unset for a single instance; the
# client-side recheck poll is always the correctness backstop.
#
# Static list of sibling peer endpoints:
peers = []
#
# Or, for elastic replicated deployments (Kubernetes), discover peers by
# resolving a headless-Service DNS name that returns every replica's address.
# This is the recommended replicated setup; see deploy/kubernetes/.
# peer_discovery_dns = "pathlockd-headless:50051"
# self_ip            = "10.0.0.5"   # wired from K8s downward API status.podIP
# peer_refresh_secs  = 10

# In-process event broadcast channel capacity.
event_buffer = 8192

# Server-side RPC timeout and HTTP/2 concurrency.
request_timeout_ms = 30000
max_concurrent_requests_per_connection = 256

# tracing log filter.
log_level = "info"

# OpenTelemetry tracing/metrics export is configured via standard OTEL_* env
# vars, not TOML. For example:
# OTEL_SERVICE_NAME=pathlockd
# OTEL_EXPORTER_OTLP_ENDPOINT=https://otel-collector.example:4318
# OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
